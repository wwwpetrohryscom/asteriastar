name: Refresh (weekly)

# Mondays — regenerate the weekly-cadence scientific snapshots from their sources.
# Each snapshot runs as an isolated job (provider-isolated) via the reusable workflow,
# which opens a reviewed PR only when the data meaningfully changes.

on:
  schedule:
    - cron: "7 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    strategy:
      fail-fast: false
      matrix:
        snapshot: [sbdb-small-bodies, wikidata-missions]
    uses: ./.github/workflows/refresh-reusable.yml
    with:
      snapshot: ${{ matrix.snapshot }}
