name: Refresh (quarterly)

# quarterly — regenerate the quarterly-cadence scientific snapshots from their sources.
# Each snapshot runs as an isolated job (provider-isolated) via the reusable workflow,
# which opens a reviewed PR only when the data meaningfully changes.

on:
  schedule:
    - cron: "41 4 5 1,4,7,10 *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    strategy:
      fail-fast: false
      matrix:
        snapshot: [gaia-stars]
    uses: ./.github/workflows/refresh-reusable.yml
    with:
      snapshot: ${{ matrix.snapshot }}
